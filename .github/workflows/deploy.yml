name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Prepare for GitHub Pages
              run: |
                  # Copiar archivos de browser a la raíz de dist/base4empresas
                  cp dist/base4empresas/browser/* dist/base4empresas/ 2>/dev/null || true
                  # Crear 404.html para SPA routing
                  cp dist/base4empresas/index.html dist/base4empresas/404.html 2>/dev/null || true
                  # Crear .nojekyll
                  touch dist/base4empresas/.nojekyll

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist/base4empresas
                  cname: edwinpurizacamejia.github.io
