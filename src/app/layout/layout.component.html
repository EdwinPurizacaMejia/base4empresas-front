<!-- Shell Layout: Toolbar + Sidebar + Content -->
<div class="layout-container">
  <!-- Toolbar Superior -->
  <app-toolbar 
    (menuToggle)="toggleSidebar()" 
    (search)="onGlobalSearch($event)">
  </app-toolbar>

  <!-- Layout Principal -->
  <div class="layout-main">
    <!-- Sidebar Navegación -->
    <app-sidebar
      [isOpen]="sidebarOpen"
      [menuItems]="menuItems"
      (toggleSidebar)="toggleSidebar()"
    ></app-sidebar>

    <!-- Área de Contenido -->
    <main class="layout-content">
      <router-outlet></router-outlet>
    </main>

    <!-- Overlay para móvil cuando sidebar está abierto -->
    <div
      class="layout-overlay"
      *ngIf="sidebarOpen && isMobileView"
      (click)="toggleSidebar()"
      [@fadeInOut]
    ></div>
  </div>
</div>
