<!-- Layout Principal con Material Sidenav -->
<app-toolbar (menuToggle)="sidenav.toggle()"></app-toolbar>

<!-- Mat Sidenav Container: Flex Layout Sidebar + Contenido -->
<mat-sidenav-container>
  <!-- Sidenav: Sidebar Izquierdo -->
  <mat-sidenav
    #sidenav
    mode="side"
    [opened]="sidebarOpen"
    [attr.aria-label]="'Navegación'"
    class="app-sidenav"
  >
    <app-sidebar [menuItems]="menuItems"></app-sidebar>
  </mat-sidenav>

  <!-- Contenido Principal: Derecha -->
  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
