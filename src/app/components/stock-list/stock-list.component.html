<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 class="title">Inventario de Stock</h1>
      <p class="subtitle">Monitorea el stock de productos por almacén</p>
    </div>
  </div>

  <!-- Warehouse Selector -->
  <div class="warehouse-selector">
    <div class="selector-group">
      <label for="warehouse-id">Almacén ID:</label>
      <input
        id="warehouse-id"
        type="text"
        [(ngModel)]="warehouseId"
        placeholder="Ej: warehouse-001, 550e8400..."
        class="warehouse-input"
        (keypress)="onKeyPress($event)"
      />
      <button class="btn-load" (click)="loadStock()" [disabled]="loading">
        {{ loading ? 'Cargando...' : 'Cargar Stock' }}
      </button>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="alert alert-error">
    {{ error }}
  </div>

  <!-- Data Table with Loading State -->
  <app-generic-data-table
    [data]="stocks"
    [config]="tableConfig"
    [loading]="loading"
    [error]="error"
    [totalItems]="stocks.length"
    (actionClick)="onTableAction($event)"
    (searchChange)="onSearch($event)"
  ></app-generic-data-table>

  <!-- Empty State -->
  <div *ngIf="!loading && stocks.length === 0 && !initialLoad" class="empty-state">
    <p class="empty-icon">📊</p>
    <p class="empty-title">No hay datos de stock</p>
    <p class="empty-text">
      {{ error ? 'Verifica el ID del almacén' : 'No se encontraron productos en este almacén' }}
    </p>
  </div>

  <!-- Initial State -->
  <div *ngIf="initialLoad && !loading" class="initial-state">
    <p class="initial-icon">🏭</p>
    <p class="initial-title">Selecciona un almacén</p>
    <p class="initial-text">Ingresa un ID de almacén y carga los datos de stock</p>
  </div>
</div>
