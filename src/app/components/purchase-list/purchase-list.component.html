<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 class="title">Compras</h1>
      <p class="subtitle">Gestiona tus pedidos de compra</p>
    </div>
    <button class="btn-primary" (click)="onNewPurchase()">
      <mat-icon>add</mat-icon>
      Nueva Compra
    </button>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <!-- Data Table -->
  <app-generic-data-table
    [data]="purchases"
    [config]="tableConfig"
    [loading]="loading"
    [error]="error"
    [totalItems]="purchases.length"
    (actionClick)="onTableAction($event)"
    (searchChange)="onSearch($event)"
  ></app-generic-data-table>
</div>

<!-- Purchase Form Modal -->
<app-purchase-form
  *ngIf="showForm"
  (purchaseCreated)="onPurchaseCreated()"
  (formClosed)="onFormClosed()"
></app-purchase-form>
