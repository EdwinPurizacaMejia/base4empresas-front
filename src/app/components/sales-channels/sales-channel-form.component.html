<h2 mat-dialog-title>{{ titleText }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Código</mat-label>
      <input
        matInput
        formControlName="code"
        placeholder="p.ej. LIVE, B2B, IN_HOUSE"
        [disabled]="isEditMode"
      />
      <mat-error *ngIf="form.get('code')?.hasError('required')">
        El código es requerido
      </mat-error>
      <mat-error *ngIf="form.get('code')?.hasError('minlength')">
        Mínimo 2 caracteres
      </mat-error>
      <mat-error *ngIf="form.get('code')?.hasError('maxlength')">
        Máximo 10 caracteres
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input
        matInput
        formControlName="name"
        placeholder="p.ej. Tienda Online"
      />
      <mat-error *ngIf="form.get('name')?.hasError('required')">
        El nombre es requerido
      </mat-error>
      <mat-error *ngIf="form.get('name')?.hasError('minlength')">
        Mínimo 3 caracteres
      </mat-error>
      <mat-error *ngIf="form.get('name')?.hasError('maxlength')">
        Máximo 100 caracteres
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción (Opcional)</mat-label>
      <textarea
        matInput
        formControlName="description"
        placeholder="Descripción del canal"
        rows="3"
      ></textarea>
      <mat-hint *ngIf="form.get('description')?.value">
        {{ form.get('description')?.value?.length || 0 }} / 500
      </mat-hint>
      <mat-error *ngIf="form.get('description')?.hasError('maxlength')">
        Máximo 500 caracteres
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="loading">
    Cancelar
  </button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSubmit()"
    [disabled]="form.invalid || loading"
  >
    <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
    {{ isEditMode ? 'Actualizar' : 'Crear' }}
  </button>
</mat-dialog-actions>
