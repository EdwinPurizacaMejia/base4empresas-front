<div class="list-page">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header__title-group">
      <h1 class="page-header__title">Gestión de Canales de Venta</h1>
      <p class="page-header__subtitle">Configura los canales de venta del negocio</p>
    </div>
    <div class="page-header__actions">
      <button
        mat-raised-button
        color="primary"
        (click)="openCreateForm()"
        [disabled]="loading"
      >
        <mat-icon>add</mat-icon>
        Nuevo Canal
      </button>
    </div>
  </div>

  <!-- Estado de carga -->
  <app-loading-spinner *ngIf="loading" message="Cargando canales..."></app-loading-spinner>

  <!-- Estado de error -->
  <app-error-state
    *ngIf="error && !loading"
    [message]="error"
    (retry)="loadChannels()"
  ></app-error-state>

  <!-- Estado vacío -->
  <app-empty-state
    *ngIf="!loading && !error && channels.length === 0"
    title="Sin canales de venta"
    message="No hay canales registrados. Crea uno nuevo para comenzar."
    icon="business"
  ></app-empty-state>

  <!-- Tabla de canales -->
  <div class="list-table-card" *ngIf="!loading && !error && channels.length > 0">
    <table mat-table [dataSource]="dataSource" class="list-table">

      <!-- Columna: Código -->
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>CÓDIGO</th>
        <td mat-cell *matCellDef="let element">
          <strong>{{ element.code }}</strong>
        </td>
      </ng-container>

      <!-- Columna: Nombre -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>NOMBRE</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <!-- Columna: Descripción -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>DESCRIPCIÓN</th>
        <td mat-cell *matCellDef="let element">
          {{ element.description || '-' }}
        </td>
      </ng-container>

      <!-- Columna: Estado -->
      <ng-container matColumnDef="is_active">
        <th mat-header-cell *matHeaderCellDef>ESTADO</th>
        <td mat-cell *matCellDef="let element">
          <span
            class="status-badge"
            [class.status-active]="element.is_active"
            [class.status-inactive]="!element.is_active"
          >
            {{ element.is_active ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <!-- Columna: Creado -->
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef>CREADO</th>
        <td mat-cell *matCellDef="let element">
          {{ element.created_at | date: 'short' }}
        </td>
      </ng-container>

      <!-- Columna: Acciones -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>ACCIONES</th>
        <td mat-cell *matCellDef="let element">
          <div class="row-actions">
            <button
              mat-icon-button
              class="action-btn edit"
              (click)="openEditForm(element)"
              matTooltip="Editar canal"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              class="action-btn delete"
              (click)="deleteChannel(element.id)"
              matTooltip="Eliminar canal"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row"></tr>
    </table>

    <!-- Paginación -->
    <mat-paginator
      [pageSizeOptions]="pageSizeOptions"
      showFirstLastButtons
    ></mat-paginator>
  </div>

</div>
