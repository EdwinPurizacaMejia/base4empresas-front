<div class="container">
  <div class="header">
    <div class="header-title-group">
      <h1>Gestión de Canales de Venta</h1>
      <p class="header-subtitle">Configura los canales de venta del negocio</p>
    </div>
    <button
      mat-raised-button
      color="primary"
      (click)="openCreateForm()"
      [disabled]="loading"
    >
      <mat-icon>add</mat-icon>
      Nuevo Canal
    </button>
  </div>

  <!-- Estado de carga -->
  <app-loading-spinner *ngIf="loading" message="Cargando canales..."></app-loading-spinner>

  <!-- Estado de error -->
  <app-error-state
    *ngIf="error && !loading"
    [message]="error"
    (retry)="loadChannels()"
  ></app-error-state>

  <!-- Estado vacío -->
  <app-empty-state
    *ngIf="!loading && !error && channels.length === 0"
    title="Sin canales de venta"
    message="No hay canales registrados. Crea uno nuevo para comenzar."
    icon="business"
  ></app-empty-state>

  <!-- Tabla de canales -->
  <div class="table-container" *ngIf="!loading && !error && channels.length > 0">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
      <!-- Columna: Código -->
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let element">
          <strong>{{ element.code }}</strong>
        </td>
      </ng-container>

      <!-- Columna: Nombre -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <!-- Columna: Descripción -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let element">
          {{ element.description || '-' }}
        </td>
      </ng-container>

      <!-- Columna: Estado -->
      <ng-container matColumnDef="is_active">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let element">
          <mat-slide-toggle
            [checked]="element.is_active"
            (change)="toggleChannel(element, $event)"
            [matTooltip]="getStatusLabel(element.is_active)"
          ></mat-slide-toggle>
          <span class="status-label" [ngClass]="getStatusColor(element.is_active)">
            {{ getStatusLabel(element.is_active) }}
          </span>
        </td>
      </ng-container>

      <!-- Columna: Creado -->
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef>Creado</th>
        <td mat-cell *matCellDef="let element">
          {{ element.created_at | date: 'short' }}
        </td>
      </ng-container>

      <!-- Columna: Acciones -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-icon-button
            color="primary"
            (click)="openEditForm(element)"
            matTooltip="Editar canal"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="deleteChannel(element.id)"
            matTooltip="Eliminar canal"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <!-- Paginación -->
    <mat-paginator
      [pageSizeOptions]="pageSizeOptions"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</div>
