<!-- ============================================================
     SALE LIST — Módulo de Ventas
     Fase 3: page-header + FilterBar aplicados
     ============================================================ -->

<div class="list-page">

  <!-- Page Header (clase global de _foundations.scss) -->
  <div class="page-header">
    <div class="page-header__title-group">
      <h1 class="page-header__title">Ventas</h1>
      <p class="page-header__subtitle">Registro de ventas y salidas de stock</p>
    </div>
    <div class="page-header__actions">
      <button mat-raised-button color="primary" (click)="onCreateSale()">
        <mat-icon>add</mat-icon>
        Registrar Venta
      </button>
    </div>
  </div>

  <!-- Mensaje de éxito -->
  <div class="sale-success-alert" *ngIf="successMessage">
    <mat-icon>check_circle</mat-icon>
    {{ successMessage }}
  </div>

  <!-- Barra de filtros estándar -->
  <app-filter-bar
    searchPlaceholder="Buscar por número o cliente..."
    [debounceMs]="300"
    (searchChange)="onSearch($event)"
    (filtersCleared)="onSearch('')">
  </app-filter-bar>

  <!-- Tabla de ventas -->
  <app-generic-data-table
    [data]="sales"
    [config]="tableConfig"
    [loading]="loading"
    [error]="error"
    [totalItems]="sales.length"
    (actionClick)="onTableAction($event)">
  </app-generic-data-table>

</div>
