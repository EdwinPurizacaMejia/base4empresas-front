<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 class="title">Productos</h1>
      <p class="subtitle">Gestiona tu inventario de productos</p>
    </div>
    <button class="btn-primary" (click)="onNewProduct()">
      <mat-icon>add</mat-icon>
      Nuevo producto
    </button>
  </div>

  <!-- Loading State -->
  <app-loading-spinner
    *ngIf="loading && products.length === 0"
    message="Cargando productos..."
  ></app-loading-spinner>

  <!-- Error State -->
  <app-error-state
    *ngIf="error && !loading"
    title="Error al cargar"
    [message]="error"
    (onRetry)="loadProducts()"
    (onGoBack)="error = null"
  ></app-error-state>

  <!-- Empty State -->
  <app-empty-state
    *ngIf="!loading && !error && products.length === 0"
    icon="inventory_2"
    title="Sin productos"
    description="No hay productos registrados. Crea uno nuevo para comenzar."
    [showAction]="true"
    actionLabel="Crear primer producto"
    (onAction)="onNewProduct()"
  ></app-empty-state>

  <!-- Data Table -->
  <app-generic-data-table
    *ngIf="!error && products.length > 0"
    [data]="products"
    [config]="tableConfig"
    [loading]="loading"
    [totalItems]="products.length"
    (actionClick)="onTableAction($event)"
    (searchChange)="onSearch($event)"
  ></app-generic-data-table>
</div>

<!-- Product Form Modal -->
<app-product-form
  *ngIf="showForm"
  (productCreated)="onProductCreated()"
  (formClosed)="onFormClosed()"
></app-product-form>
