<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 class="title">Productos</h1>
      <p class="subtitle">Gestiona tu inventario de productos</p>
    </div>
    <button class="btn-primary" (click)="onNewProduct()">
      <mat-icon>add</mat-icon>
      Nuevo producto
    </button>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <!-- Data Table -->
  <app-generic-data-table
    [data]="products"
    [config]="tableConfig"
    [loading]="loading"
    [error]="error"
    [totalItems]="products.length"
    (actionClick)="onTableAction($event)"
    (searchChange)="onSearch($event)"
  ></app-generic-data-table>
</div>

<!-- Product Form Modal -->
<app-product-form
  *ngIf="showForm"
  (productCreated)="onProductCreated()"
  (formClosed)="onFormClosed()"
></app-product-form>
